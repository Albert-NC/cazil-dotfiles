# ==============================================================================
# ILIDARY SYSTEM - KITTY CONFIGURATION
# "You are not prepared."
# ==============================================================================

#: 1. FUENTES Y TAMAÑO
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0
adjust_line_height 10%

#: 2. VENTANA Y APARIENCIA
# Transparencia mínima para eficiencia
background_opacity 0.90

# Sin decoraciones (Hyprland lo maneja)
hide_window_decorations yes

# Padding
window_padding_width 15

# Sin beep
enable_audio_bell no

#: 3. COMPORTAMIENTO
shell /usr/bin/zsh
copy_on_select no

#: 4. COLOR SCHEME — ILIDARY (Fel Green / Abyssal Purple / Black)
foreground            #c9d1d9
background            #060b0f

# Cursor Fel verde
cursor                #00ff87
cursor_shape          beam

selection_foreground  #060b0f
selection_background  #00ff87

# Paleta ILIDARY — colores normales (0-7)
color0  #060b0f     # Negro abismal
color1  #ff4444     # Rojo error
color2  #00ff87     # Verde Fel (primario)
color3  #f6ad55     # Naranja advertencia
color4  #8b00ff     # Púrpura abismal
color5  #6b46c1     # Violeta oscuro
color6  #39d353     # Verde esmeralda
color7  #c9d1d9     # Blanco frío

# Paleta ILIDARY — colores brillantes (8-15)
color8   #1a0a2e    # Morado muy oscuro
color9   #ff6666    # Rojo brillante
color10  #00ff87    # Verde Fel brillante
color11  #fcd34d    # Amarillo
color12  #a855f7    # Violeta brillante
color13  #8b00ff    # Púrpura abismal brillante
color14  #57ff9a    # Verde menta
color15  #e2e8f0    # Blanco
