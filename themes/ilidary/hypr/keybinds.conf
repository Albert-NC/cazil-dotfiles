# ==============================================================================
# ILIDARY SYSTEM - KEYBINDINGS
# Mismos atajos que 218. La diferencia es solo visual (tema).
# ==============================================================================

# --------------------------------------------------------------------------
# APLICACIONES
# --------------------------------------------------------------------------
bind = $mainMod, T,     exec, $terminal                                     # Terminal
bind = $mainMod, B,     exec, brave-browser                                 # Brave
bind = $mainMod, F,     exec, $fileManager                                  # Archivos
bind = $mainMod, D,     exec, $menu                                         # Launcher (Rofi)
bindr = SUPER, SUPER_L, exec, $menu

# SCRATCHPADS
bind = $mainMod ALT, T, exec, pypr toggle term
bind = $mainMod ALT, C, exec, pypr toggle calc

bind = $mainMod, C,     exec, code                                          # VSCode

# --------------------------------------------------------------------------
# SCREENSHOTS
# --------------------------------------------------------------------------
bind = $mainMod, Print,       exec, grim ~/Pictures/screenshot_$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot" "Pantalla completa guardada"
bind = $mainMod SHIFT, Print, exec, grim -g "$(slurp)" - | tee ~/Pictures/screenshot_$(date +%Y%m%d_%H%M%S).png | wl-copy && notify-send "Screenshot" "Área seleccionada copiada"

# Portapapeles
bind = $mainMod, V, exec, cliphist list | wofi -dmenu | cliphist decode | wl-copy

# --------------------------------------------------------------------------
# CONTROL DE VENTANAS
# --------------------------------------------------------------------------
bind = $mainMod, Q,         killactive,
bind = $mainMod, Return,    fullscreen, 0
bind = $mainMod SHIFT, F,   fullscreen, 1
bind = $mainMod, SPACE,     togglefloating,
bind = $mainMod, P,         pseudo,
bind = $mainMod, J,         togglesplit,

# --- Foco ---
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H,     movefocus, l
bind = $mainMod, K,     movefocus, u

# --- Mover ventanas ---
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# --- Modo resize ---
bind = $mainMod, R, submap, resize
submap = resize
binde = , right, resizeactive,  10 0
binde = , left,  resizeactive, -10 0
binde = , up,    resizeactive,   0 -10
binde = , down,  resizeactive,   0 10
bind  = , escape, submap, reset
submap = reset

# --------------------------------------------------------------------------
# WORKSPACES
# --------------------------------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3

bind = $mainMod, S,       togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# --------------------------------------------------------------------------
# RATÓN
# --------------------------------------------------------------------------
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --------------------------------------------------------------------------
# MULTIMEDIA
# --------------------------------------------------------------------------
bind = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bind = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute,      exec, swayosd-client --input-volume mute-toggle

bind = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

bind = , XF86AudioPlay,  exec, playerctl play-pause
bind = , XF86AudioStop,  exec, playerctl stop
bind = , XF86AudioNext,  exec, playerctl next
bind = , XF86AudioPrev,  exec, playerctl previous

# --------------------------------------------------------------------------
# SISTEMA
# --------------------------------------------------------------------------
bind = $mainMod, L,         exec, hyprlock                                  # Bloquear pantalla
bind = $mainMod, Escape,    exec, hyprlock                                  # Bloquear pantalla (alt)
bind = $mainMod SHIFT, E,   exec, wlogout                                   # Menú de salida
bind = $mainMod SHIFT, Q,   exit,                                           # Salir de Hyprland

# Tapa del laptop → suspender inmediatamente
bindl = , switch:on:Lid Switch,  exec, systemctl suspend
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

bind = $mainMod, O, exec, monitor-toggle
