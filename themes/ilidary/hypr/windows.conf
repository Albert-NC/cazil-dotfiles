# ==============================================================================
# ILIDARY SYSTEM - REGLAS DE VENTANAS Y DECORACIÓN
# "You are not prepared." — Sin blur. Sin piedad. Máxima eficiencia.
# ==============================================================================

# --------------------------------------------------------------------------
# CONFIGURACIÓN DE ENTRADA
# --------------------------------------------------------------------------
input {
    kb_layout = latam
    kb_variant = deadtilde
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        tap-to-click = yes
        drag_lock = no
        disable_while_typing = yes
    }

    sensitivity = 0
    accel_profile = flat
    repeat_delay = 300
    repeat_rate = 30
}

gestures {
    workspace_swipe = yes
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert = yes
}

# --------------------------------------------------------------------------
# CONFIGURACIÓN GENERAL
# --------------------------------------------------------------------------
general {
    gaps_in = 3                     # Gaps sutiles para ver el borde Illidan
    gaps_out = 6                    # Espacio exterior mínimo
    border_size = 2

    # ILLIDAN: Verde Fel + Púrpura Abismal
    col.active_border   = rgba(00ff87ff) rgba(8b00ffff) 45deg
    col.inactive_border = rgba(1a0a2eaa)

    layout = dwindle
    allow_tearing = true
}

# --------------------------------------------------------------------------
# DECORACIÓN — SIN BLUR (MÁXIMA EFICIENCIA)
# --------------------------------------------------------------------------
decoration {
    rounding = 0                    # Bordes rectos — estilo Illidan

    # BLUR COMPLETAMENTE DESACTIVADO
    blur {
        enabled = false
    }

    # Sombra sutil verde fel
    drop_shadow = yes
    shadow_range = 15
    shadow_render_power = 2
    col.shadow = rgba(00ff8733)
    shadow_offset = 0 2

    # Opacidad
    active_opacity   = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    dim_inactive = false
}

# --------------------------------------------------------------------------
# ANIMACIONES — MÍNIMAS PERO ELEGANTES
# --------------------------------------------------------------------------
animations {
    enabled = yes

    # Beziers minimalistas
    bezier = felSlide,  0.16, 1, 0.3, 1
    bezier = felFade,   0.4,  0, 0.6, 1
    bezier = sharp,     0.25, 0, 0.75, 1

    # Ventanas: slide rápido, sin rebote
    animation = windows,     1, 3, felSlide, slide
    animation = windowsOut,  1, 2, felFade,  slide
    animation = windowsMove, 1, 3, sharp

    # Bordes sin animación compleja
    animation = border,      1, 8,  default
    animation = borderangle, 1, 12, default

    # Fade veloz
    animation = fade,        1, 3, felFade

    # Workspace: slide horizontal limpio
    animation = workspaces,        1, 3, felSlide, slide
    animation = specialWorkspace,  1, 3, felSlide, slidevert
}

# --------------------------------------------------------------------------
# LAYOUTS
# --------------------------------------------------------------------------
dwindle {
    pseudotile = yes
    preserve_split = yes
    force_split = 2
    no_gaps_when_only = false
}

master {
    new_is_master = false
    new_on_top = false
    no_gaps_when_only = false
    orientation = left
    inherit_fullscreen = true
}

# --------------------------------------------------------------------------
# MISCELÁNEOS
# --------------------------------------------------------------------------
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    vfr = true                      # Variable Frame Rate (batería)
    vrr = 1                         # G-SYNC/FreeSync
    animate_manual_resizes = false  # Sin animación al redimensionar manual
    enable_swallow = true
    swallow_regex = ^(kitty)$
    focus_on_activate = true
    no_direct_scanout = false
}

# --------------------------------------------------------------------------
# REGLAS DE VENTANA
# --------------------------------------------------------------------------
windowrulev2 = float,  class:^(pavucontrol)$
windowrulev2 = float,  class:^(nm-connection-editor)$
windowrulev2 = float,  class:^(blueman-manager)$
windowrulev2 = float,  class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrulev2 = float,  class:^(thunar)$, title:^(File Operation Progress)$

# Rofi
windowrulev2 = float,       class:^(rofi)$
windowrulev2 = center,      class:^(rofi)$
windowrulev2 = stayfocused, class:^(rofi)$

# KeePassXC
windowrulev2 = float, class:^(org.keepassxc.KeePassXC)$

# ======================================================================
# GAMING: Máximo rendimiento (igual que 218)
# ======================================================================
windowrulev2 = fullscreen, class:^(steam_app).*
windowrulev2 = immediate,  class:^(steam_app).*
windowrulev2 = noborder,   class:^(steam_app).*
windowrulev2 = noshadow,   class:^(steam_app).*
windowrulev2 = noblur,     class:^(steam_app).*
windowrulev2 = noanim,     class:^(steam_app).*

windowrulev2 = immediate,  class:^(gamescope)$
windowrulev2 = fullscreen, class:^(gamescope)$
windowrulev2 = noborder,   class:^(gamescope)$

windowrulev2 = immediate,  class:^(Minecraft).*
windowrulev2 = fullscreen, class:^(Minecraft).*

windowrulev2 = immediate,  class:^(wine)$
windowrulev2 = fullscreen, class:^(wine)$
windowrulev2 = immediate,  title:^(Lutris)$

# ======================================================================

# Picture-in-Picture
windowrulev2 = float,       title:^(Picture-in-Picture)$
windowrulev2 = pin,         title:^(Picture-in-Picture)$
windowrulev2 = move 70% 70%,title:^(Picture-in-Picture)$
windowrulev2 = size 25% 25%,title:^(Picture-in-Picture)$

# Opacidad personalizada
windowrulev2 = opacity 0.9 0.82, class:^(kitty)$
windowrulev2 = opacity 0.95 0.9, class:^(Code)$

# --------------------------------------------------------------------------
# REGLAS DE CAPA
# --------------------------------------------------------------------------
layerrule = ignorezero, waybar
# Sin blur en layers — consistente con la filosofía sin blur del tema
