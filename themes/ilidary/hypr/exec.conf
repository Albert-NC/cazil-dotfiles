# ==============================================================================
# ILIDARY SYSTEM - EJECUCIONES DE INICIO (AUTOSTART)
# "The wretched and the damned... they will all bow."
# ==============================================================================

# --------------------------------------------------------------------------
# SISTEMA
# --------------------------------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# --------------------------------------------------------------------------
# INTERFAZ
# --------------------------------------------------------------------------
exec-once = waybar                                          # Barra de estado
exec-once = hyprpaper                                       # Fondo de pantalla
exec-once = hypridle                                        # Gestión de inactividad (lock/suspend)
exec-once = pypr                                            # Scratchpads

# --------------------------------------------------------------------------
# HARDWARE ESPECÍFICO
# --------------------------------------------------------------------------
exec-once = rgb-load                                       # Control RGB Acer
exec-once = swayosd-server                                  # OSD para volumen/brillo
exec-once = nm-applet --indicator                           # WiFi tray
exec-once = blueman-applet                                  # Bluetooth tray
exec-once = udiskie &                                       # Auto-mount USB
exec-once = gammastep -O 4500                               # Luz nocturna

# --------------------------------------------------------------------------
# UTILIDADES
# --------------------------------------------------------------------------
exec-once = hyprctl setcursor Bibata-Modern-Classic 24      # Cursor en apps XWayland
exec-once = sleep 1 && xdg-desktop-portal-hyprland &        # Portales XDG (screenshare, Flatpak)
exec-once = wl-paste --type text --watch cliphist store     # Historial portapapeles
exec-once = wl-paste --type image --watch cliphist store

# --------------------------------------------------------------------------
# NOTIFICACIONES
# --------------------------------------------------------------------------
exec-once = mako                                             # Daemon de notificaciones

# --------------------------------------------------------------------------
# POLKIT
# --------------------------------------------------------------------------
exec-once = hyprpolkitagent
