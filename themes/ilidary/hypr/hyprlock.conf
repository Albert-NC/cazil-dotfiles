# ==============================================================================
# ILIDARY - HYPRLOCK CONFIGURATION (Pantalla de Bloqueo Estilo Minimalista)
# Colores: Emerald Green + Gris oscuro
# ==============================================================================

# --------------------------------------------------------------------------
# FONDO DE PANTALLA
# --------------------------------------------------------------------------
background {
    monitor =
    path = ~/Pictures/wallpapers/ilidary_wallpaper.png
    blur_passes = 2
    blur_size = 5
    noise = 0.0100
    contrast = 0.90
    brightness = 0.75
    vibrancy = 0.10
    vibrancy_darkness = 0.0
}

# --------------------------------------------------------------------------
# CAMPO DE CONTRASEÑA
# --------------------------------------------------------------------------
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.30
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1

    # Colores verde esmeralda
    outer_color = rgb(00c896)                   # Verde ilidary
    inner_color = rgb(0d1a14)                   # Fondo muy oscuro verde
    font_color = rgb(00c896)

    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Contraseña...</i>

    check_color = rgb(00ff88)                   # Verde brillante (verificando)
    fail_color = rgb(ff4444)                    # Rojo (incorrecto)

    position = 0, -120
    halign = center
    valign = center
}

# --------------------------------------------------------------------------
# RELOJ
# --------------------------------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M:%S')"
    color = rgb(00c896)
    font_size = 60
    font_family = JetBrainsMono Nerd Font

    position = 0, 200
    halign = center
    valign = center
}

# --------------------------------------------------------------------------
# FECHA
# --------------------------------------------------------------------------
label {
    monitor =
    text = cmd[update:3600000] echo "$(date '+%A, %d de %B')"
    color = rgb(668866)
    font_size = 20
    font_family = JetBrainsMono Nerd Font

    position = 0, 140
    halign = center
    valign = center
}

# --------------------------------------------------------------------------
# USUARIO
# --------------------------------------------------------------------------
label {
    monitor =
    text = $USER
    color = rgb(00c896)
    font_size = 24
    font_family = JetBrainsMono Nerd Font

    position = 0, -60
    halign = center
    valign = center
}

# --------------------------------------------------------------------------
# MENSAJE DE BLOQUEO
# --------------------------------------------------------------------------
label {
    monitor =
    text = [ BLOQUEADO ]
    color = rgb(006644)
    font_size = 14
    font_family = JetBrainsMono Nerd Font

    position = 0, -300
    halign = center
    valign = center
}

# --------------------------------------------------------------------------
# CAPS LOCK
# --------------------------------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] [ $(cat /sys/class/leds/input*::capslock/brightness 2>/dev/null) = "1" ] && echo "⬆ CAPS LOCK" || echo ""
    color = rgb(ff4444)
    font_size = 14
    font_family = JetBrainsMono Nerd Font

    position = 0, -180
    halign = center
    valign = center
}
