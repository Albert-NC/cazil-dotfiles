# ==============================================================================
# ILIDARY SYSTEM - CONFIGURACIÓN MAESTRA DE HYPRLAND
# Versión: 1.0 — Illidan Theme
# "You are not prepared."
# ==============================================================================

# --------------------------------------------------------------------------
# VARIABLES MAESTRAS
# --------------------------------------------------------------------------
$mainMod = SUPER
$home = ~/.config/hypr
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun

# --------------------------------------------------------------------------
# CARGAR CONFIGURACIONES MODULARES
# --------------------------------------------------------------------------
source = $home/env.conf
source = $home/monitors.conf
source = $home/exec.conf
source = $home/windows.conf
source = $home/keybinds.conf

# --------------------------------------------------------------------------
# TECLADO (100% ESPAÑOL)
# --------------------------------------------------------------------------
input {
    kb_layout = latam
    kb_variant = deadtilde
    numlock_by_default = true
    follow_mouse = 1
    sensitivity = 0
}
