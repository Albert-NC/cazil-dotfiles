[manager]
ratio          = [ 1, 3, 4 ]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true

[preview]
tab_size        = 2
max_width       = 600
max_height      = 900
cache_dir       = ""
image_filter    = "lanczos3"
image_quality   = 75
sixel_fraction  = 15
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
edit = [
	{ exec = 'nvim "$@"', block = true, for = "unix" },
]
open = [
	{ exec = 'xdg-open "$@"', desc = "Open", for = "unix" },
]
reveal = [
	{ exec = '''exiftool "$1"; echo "Press enter to exit"; read _''', block = true, desc = "Exif", for = "unix" },
]
extract = [
	{ exec = 'atool -x "$1"', desc = "Extract", for = "unix" },
]
play = [
	{ exec = 'mpv "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
	{ name = "*/", use = [ "edit", "open", "reveal" ] },
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	{ mime = "image/*", use = [ "open", "reveal" ] },
	{ mime = "video/*", use = [ "play", "reveal" ] },
	{ mime = "audio/*", use = [ "play", "reveal" ] },
	{ mime = "inode/x-empty", use = [ "edit", "reveal" ] },
	{ mime = "application/json", use = [ "edit", "reveal" ] },
	{ mime = "application/pdf", use = [ "open", "reveal" ] },
	{ mime = "application/zip", use = [ "extract", "reveal" ] },
	{ mime = "application/x-tar", use = [ "extract", "reveal" ] },
	{ mime = "application/x-bzip2", use = [ "extract", "reveal" ] },
	{ mime = "application/x-7z-compressed", use = [ "extract", "reveal" ] },
	{ mime = "application/x-rar", use = [ "extract", "reveal" ] },
	{ mime = "application/x-xz", use = [ "extract", "reveal" ] },
	{ use = [ "open", "reveal" ] },
]
