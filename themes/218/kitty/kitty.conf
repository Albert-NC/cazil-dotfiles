# ==============================================================================
# CAZIL SYSTEM - KITTY CONFIGURATION (CLEAN VERSION)
# ------------------------------------------------------------------------------

#: 1. FUENTES Y TAMAÑO
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0
adjust_line_height  10%

#: 2. VENTANA Y APARIENCIA
# Opacidad: Semi-transparente (85%)
background_opacity 0.85

# No decoraciones (Hyprland lo maneja)
hide_window_decorations yes

# Margen interno (Padding)
window_padding_width 15

# Desactivar el beep molesto
enable_audio_bell no

#: 3. COMPORTAMIENTO
# Usar ZSH (el que instalamos)
shell /usr/bin/zsh

# Deshabilitar auto-copia al seleccionar (se hace con el teclado)
copy_on_select no

#: 4. COLOR SCHEME (CAZIL CYBERPUNK: Morado/Cyan/Rosa)
foreground            #e0e0e8
background            #0d0d14

# Cursor (Cyan neón)
cursor                #00d9ff
cursor_shape          beam

selection_foreground  #0d0d14
selection_background  #00d9ff

# Paleta CAZIL Cyberpunk - Colores normales (0-7)
color0  #0d0d14
color1  #ff4da6
color2  #00d9ff
color3  #ffaa00
color4  #7a5dc7
color5  #ff4da6
color6  #00d9ff
color7  #a0a0b0

# Paleta CAZIL Cyberpunk - Colores brillantes (8-15)
color8   #2d1f3d
color9   #ff4da6
color10  #00d9ff
color11  #ffcc00
color12  #9d7cd8
color13  #ff6bc6
color14  #33e6ff
color15  #e0e0e8
