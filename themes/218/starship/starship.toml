format = """
[оғҖ ](bg:#fec249 fg:#000000)\
$os\
$username\
[оғҖ](bg:#ff5757 fg:#fec249)\
$directory\
[оғҖ](fg:#ff5757 bg:#57FFFF)\
$git_branch\
$git_status\
[оғҖ](fg:#57FFFF bg:#ff66c4)\
$time\
[оғҖ](fg:#ff66c4 bg:#5ce1e6)\
$cmd_duration\
[оғҖ  ](fg:#5ce1e6)\
$line_break\
$character 
"""
# A new line at the beginning
add_newline = true

[character]
success_symbol = "[в””в”ҖвқҜвқҜ](fg:#fec249 bg:#0d0d14 bold)"
error_symbol   = "[в””в”ҖвқҜвқҜ](fg:#fec249 bg:#ff5757 bold)"
vimcmd_symbol  = "[в””в”ҖвқҜвқҜ](fg:#fec249 bg:#57FFFF bold)"

[username]
show_always = true
style_user = "bg:#fec249 fg:#000000"
style_root = "bg:#00b6ba"
format = '[$user ]($style)'
disabled = false

# Display OS
[os]
style = "bg:#fec249 fg:#000000"
disabled = false # Disabled by default

# Insert a symbol of your OS to the prompt. This is all symbols added.
[os.symbols]
AlmaLinux = "пҢқ "
Alpine = "пҢҖ "
Android = "оңҺ "
Arch = "у°ЈҮ "
Artix = "пҢҹ "
CachyOS = "оқұ "
CentOS = "ојҪ "
Debian = "оқҪ "
DragonFly = "о»ё "
EndeavourOS = "пҢў "
Fedora = "оҹҷ "
FreeBSD = "пҠҸ "
Garuda = "пҢ· "
Gentoo = "оҹҰ "
Kali = "пҢ§ "
Linux = "п…ј "
Macos = "оң‘ "
Manjaro = "пҢ’ "
Mint = "у°Јӯ "
NetBSD = "рҹҡ© "
NixOS = "уұ„… "
Nobara = "пҺҖ "
OpenBSD = "пҢЁ "
openSUSE = "оЎ— "
OracleLinux = "у°«ј "
Pop = "о»ё "
Raspbian = "оңў "
Redhat = "оҪқ "
RedHatEnterprise = "оҪқ "
RockyLinux = "оў‘ "
Solus = "пҢӯ "
SUSE = "оҪӯ "
Ubuntu = "о»ё "
Unknown = "оҜғ "
Void = "пҢ® "
Windows = "оҳӘ "

[directory]
style = "bg:#ff5757 fg:#000000"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#57FFFF fg:#000000"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#57FFFF fg:#000000"
format = '[$all_status$ahead_behind ]($style)'


[time]
disabled = false
time_format = "%b %d, %I:%M %P" # Hour:Minute Format
style = "bg:#ff66c4 fg:#000000"
format = "[ $time ]($style)"

[cmd_duration]
disabled = false
min_time = 2000
style = 'bg:#5ce1e6 fg:#000000'
format = '[ Took $duration!]($style)'

