# ==============================================================================
# CAZIL - HYPRLOCK CONFIGURATION (Pantalla de Bloqueo Estilo Cyberpunk)
# Ubicación: ~/.config/hypr/hyprlock.conf
# ==============================================================================

background {
    monitor =
    path = ~/Pictures/wallpapers/cazil_logo_transparente.png
    blur_passes = 2
    blur_size = 5
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# ── IZQUIERDA: Hora grande ───────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgb(00d9ff)
    font_size = 80
    font_family = JetBrainsMono Nerd Font
    position = -200, 80
    halign = left
    valign = center
}

# ── IZQUIERDA: Fecha mediana ─────────────────────────────────
label {
    monitor =
    text = cmd[update:3600000] echo "$(date '+%A, %d de %B')"
    color = rgb(888888)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = -200, 0
    halign = left
    valign = center
}

# ── DERECHA: Logo cuadrado neón ──────────────────────────────
image {
    monitor =
    path = ~/Pictures/wallpapers/cazil_logo.png
    size = 120
    rounding = 0
    border_size = 3
    border_color = rgba(00ffffcc)
    position = 200, 80
    halign = right
    valign = center
}

# ── DERECHA: Usuario ─────────────────────────────────────────
label {
    monitor =
    text = $USER
    color = rgb(ff69b4)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 200, 0
    halign = right
    valign = center
}

# ── CENTRO ABAJO: Input de contraseña ────────────────────────
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgb(00ffff)
    inner_color = rgb(1a1a2e)
    font_color = rgb(00ffff)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Ingresa contraseña...</i>
    check_color = rgb(ff69b4)
    fail_color = rgb(ff006e)
    position = 0, -80
    halign = center
    valign = center
}

# ── CENTRO: CapsLock ─────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] brightnessctl -d '*::capslock' get 2>/dev/null | grep -q "1" && echo "⬆ CAPS LOCK" || echo ""
    color = rgb(ff006e)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -140
    halign = center
    valign = center
}