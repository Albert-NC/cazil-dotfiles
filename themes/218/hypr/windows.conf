# ==============================================================================
# CAZIL SYSTEM - REGLAS DE VENTANAS Y DECORACIÓN
# ==============================================================================

# --------------------------------------------------------------------------
# CONFIGURACIÓN DE ENTRADA
# --------------------------------------------------------------------------
input {
    kb_layout = latam               # Teclado latinoamericano
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1                # El foco sigue al ratón
    
    # Touchpad (para laptop)
    touchpad {
        natural_scroll = yes        # Scroll natural
        tap-to-click = yes          # Tap para click
        drag_lock = no
        disable_while_typing = yes
    }

    sensitivity = 0                 # -1.0 a 1.0, 0 = sin modificación
    accel_profile = flat            # 'flat' o 'adaptive'
    
    repeat_delay = 300              # Delay antes de repetir tecla (ms)
    repeat_rate = 30                # Repeticiones por segundo
}

# Gestos del touchpad
gestures {
    workspace_swipe = yes           # Swipe para cambiar workspace
    workspace_swipe_fingers = 3     # Número de dedos
    workspace_swipe_distance = 300  # Distancia mínima
    workspace_swipe_invert = yes    # Invertir dirección
}

# --------------------------------------------------------------------------
# CONFIGURACIÓN GENERAL
# --------------------------------------------------------------------------
general {
    gaps_in = 0                     # Sin espacio entre ventanas
    gaps_out = 0                    # Sin espacio con los bordes de pantalla
    border_size = 2                 # Grosor del borde
    
    # Colores de borde (CAZIL Cyberpunk: Solo color primario Rosa)
    col.active_border = rgba(ff69b4ee)
    col.inactive_border = rgba(00000000)
    
    layout = dwindle                # Layout por defecto: dwindle o master
    
    # ACTIVADO: Permitir tearing (mejora FPS en juegos)
    allow_tearing = true
}

# --------------------------------------------------------------------------
# DECORACIÓN
# --------------------------------------------------------------------------
decoration {
    rounding = 0                    # Sin esquinas redondeadas
    
    # Blur
    blur {
        enabled = false
        size = 6
        passes = 2
        new_optimizations = true
        xray = false
        ignore_opacity = false
    }
    
    # Sombras
    shadow {
        enabled = false
        range = 20
        render_power = 3
        color = rgba(1a1b26ee)
        offset = 0 0
    }
    
    # Opacidad
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0
    
    # Dimming
    dim_inactive = false
    dim_strength = 0.1
}

# --------------------------------------------------------------------------
# ANIMACIONES
# --------------------------------------------------------------------------
animations {
    enabled = no
    
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    
    animation = windows, 1, 4, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, default
    animation = border, 1, 10, default
    # animation = borderangle, 1, 8, default
    animation = fade, 1, 5, smoothIn
    animation = workspaces, 1, 5, overshot, slide
    animation = specialWorkspace, 1, 5, overshot, slidevert
}

# --------------------------------------------------------------------------
# LAYOUTS
# --------------------------------------------------------------------------
# Dwindle (espiral)
dwindle {
    pseudotile = yes
    preserve_split = yes
    force_split = 2
    no_gaps_when_only = 1           # Sin gaps si solo hay 1 ventana (1 = yes)
}

# Master (ventana maestra)
master {
    new_on_top = false
    no_gaps_when_only = 1
    orientation = left
    inherit_fullscreen = true
}

# --------------------------------------------------------------------------
# MISCELÁNEOS
# --------------------------------------------------------------------------
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    vfr = true                      # Variable Frame Rate (ahorra batería)
    vrr = 0                         # VRR (G-SYNC/FreeSync) - Desactivado por flickering en NVIDIA
    animate_manual_resizes = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
    focus_on_activate = true
    
    # GAMING: Mejor rendimiento
    no_direct_scanout = false
}

# --------------------------------------------------------------------------
# REGLAS DE VENTANA
# --------------------------------------------------------------------------
# Ventanas flotantes (utilidades del sistema)
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrulev2 = float, class:^(thunar)$, title:^(File Operation Progress)$

# Rofi (centro de pantalla)
windowrulev2 = float, class:^(rofi)$
windowrulev2 = center, class:^(rofi)$
windowrulev2 = stayfocused, class:^(rofi)$

# KeePassXC
windowrulev2 = float, class:^(org.keepassxc.KeePassXC)$

# ======================================================================
# GAMING: Reglas optimizadas para máximo rendimiento
# ======================================================================
# Steam games
windowrulev2 = fullscreen, class:^(steam_app).*
windowrulev2 = immediate, class:^(steam_app).*      # Tearing = MÁS FPS
windowrulev2 = noborder, class:^(steam_app).*
windowrulev2 = noshadow, class:^(steam_app).*
windowrulev2 = noblur, class:^(steam_app).*
windowrulev2 = noanim, class:^(steam_app).*

# Otros launchers de juegos
windowrulev2 = immediate, class:^(gamescope)$
windowrulev2 = fullscreen, class:^(gamescope)$
windowrulev2 = noborder, class:^(gamescope)$

# Minecraft (Java)
windowrulev2 = immediate, class:^(Minecraft).*
windowrulev2 = fullscreen, class:^(Minecraft).*

# Wine/Proton games
windowrulev2 = immediate, class:^(wine)$
windowrulev2 = fullscreen, class:^(wine)$

# Lutris
windowrulev2 = immediate, title:^(Lutris)$

# ======================================================================

# Picture-in-Picture
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = move 70% 70%, title:^(Picture-in-Picture)$
windowrulev2 = size 25% 25%, title:^(Picture-in-Picture)$

# Opacidad personalizada (NO aplicar a juegos)
windowrulev2 = opacity 0.9 0.8, class:^(kitty)$
windowrulev2 = opacity 0.95 0.9, class:^(Code)$

# --------------------------------------------------------------------------
# REGLAS DE CAPA (Layer Rules)
# --------------------------------------------------------------------------
# layerrule = blur, waybar
# layerrule = blur, rofi
# layerrule = ignorezero, waybar
