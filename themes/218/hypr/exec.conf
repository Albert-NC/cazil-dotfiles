# ==============================================================================
# CAZIL SYSTEM - EJECUCIONES DE INICIO (AUTOSTART)
# ==============================================================================

# --------------------------------------------------------------------------
# SISTEMA
# --------------------------------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# --------------------------------------------------------------------------
# INTERFAZ
# --------------------------------------------------------------------------
exec-once = waybar                                          # Barra de estado
exec-once = swww-daemon --format xrgb                       # Fondo de pantalla (Modo Eficiente)
exec-once = hypridle                                        # Gestión de inactividad (lock/suspend)
# exec-once = pypr                                            # Pyprland (Desactivado por eficiencia)
exec-once = libinput-gestures-setup start                   # Gestos del touchpad
# exec-once = easyeffects --daemon                            # (Desactivado: Alto consumo de CPU)

# --------------------------------------------------------------------------
# HARDWARE ESPECÍFICO
# --------------------------------------------------------------------------
exec-once = bash $HOME/.local/bin/apagar-redes-grub                         # Apagar Wi-Fi y Bluetooth al inicio
exec-once = rgb-load                                       # Control RGB Acer
# exec-once = swayosd-server --style ~/.config/swayosd/style.css # (Desactivado: demonio no necesario)
exec-once = mkdir -p ~/Imágenes/Capture
exec-once = nm-applet --indicator &                         # WiFi tray
exec-once = blueman-applet                                  # Bluetooth tray
exec-once = udiskie &                                       # Auto-mount USB
exec-once = gammastep -O 4500                               # Luz nocturna (4500K)

# --------------------------------------------------------------------------
# UTILIDADES
# --------------------------------------------------------------------------
exec-once = hyprctl setcursor Bibata-Modern-Classic 24      # Cursor en apps XWayland
exec-once = systemctl --user start xdg-desktop-portal-hyprland           # Portales XDG (screenshare, Flatpak)
exec-once = wl-paste --type text --watch cliphist store     # Historial portapapeles
exec-once = wl-paste --type image --watch cliphist store

# --------------------------------------------------------------------------
# NOTIFICACIONES
# --------------------------------------------------------------------------
exec-once = mako                                            # Daemon de notificaciones

# --------------------------------------------------------------------------
# POLKIT (permisos administrativos en GUI)
# --------------------------------------------------------------------------
exec-once = hyprpolkitagent

# --------------------------------------------------------------------------
# PRIVACIDAD AL INICIO
# --------------------------------------------------------------------------
exec-once = wpctl set-mute @DEFAULT_AUDIO_SOURCE@ 1      # Micrófono mutado por defecto
