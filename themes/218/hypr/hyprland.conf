# ==============================================================================
# CAZIL SYSTEM - CONFIGURACIÓN MAESTRA DE HYPRLAND
# Versión: 3.0 Modular
# Target: Debian Sid + NVIDIA + Acer Nitro
# ==============================================================================

# --------------------------------------------------------------------------
# VARIABLES MAESTRAS
# --------------------------------------------------------------------------
$mainMod = SUPER                    # Tecla Windows/Super como modificador
$home = ~/.config/hypr                # Ruta de configuraciones instaladas
$terminal = kitty                   # Terminal predeterminada
$fileManager = thunar               # Gestor de archivos
$menu = rofi -show drun            # Launcher de aplicaciones (Rofi-Wayland)

# --------------------------------------------------------------------------
# CARGAR CONFIGURACIONES MODULARES
# --------------------------------------------------------------------------
source = $home/env.conf             # Variables de entorno (generado desde shared/hypr/env.conf)
source = $home/monitors.conf        # Configuración de monitores
source = $home/exec.conf            # Autostart (exec-once)
source = $home/windows.conf         # Reglas de ventanas, decoración, animaciones
source = $home/keybinds.conf        # Atajos de teclado

# --------------------------------------------------------------------------
# TECLADO (100% ESPAÑOL)
# --------------------------------------------------------------------------
input {
    kb_layout = latam
    kb_variant = deadtilde
    numlock_by_default = true
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}
