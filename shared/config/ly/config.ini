#
# /etc/ly/config.ini — CAZIL Cyberpunk
# Ly TUI Display Manager — configurado para Hyprland + Matrix animation
# Referencia oficial: https://github.com/fairyglade/ly
#

# ── ANIMACIÓN ────────────────────────────────────────────────
# true  = activar animación de fondo
animate         = true
# 0 = none | 1 = CMatrix (lluvia de caracteres) | 2 = PSX Doom fire
animation       = 1

# ── SESIÓN POR DEFECTO ───────────────────────────────────────
# Selecciona Hyprland automáticamente al arrancar
waylandsessions = /usr/share/wayland-sessions
default_session = hyprland

# ── APARIENCIA ───────────────────────────────────────────────
# Posición vertical del cuadro de login (porcentaje)
# 0.5 = centrado, 0.7 = más abajo (clásico)
yalign          = 0.5

# Colores de resaltado (cyan cyberpunk)
# Formato: color ANSI o hex si tu versión lo soporta
fg              = 6    # Cyan
bg              = 0    # Negro

# ── COMPORTAMIENTO ───────────────────────────────────────────
# Limpiar TTY antes de mostrar ly
clear_password  = true

# Guardar la última sesión seleccionada por usuario
save_session    = true

# TTY donde corre ly (evitar conflictos con Hyprland)
tty             = 2

# Número máximo de intentos de login fallidos antes de bloquear
max_login_tries = 5

# ── PANTALLAS ────────────────────────────────────────────────
# Si tienes monitor externo conectado en boot, usa el número de pantalla
# numlock = true   # descomentar para activar NumLock al arrancar
