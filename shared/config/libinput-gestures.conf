# ==============================================================================
# CAZIL SYSTEM — libinput-gestures.conf
# Gestos para el touchpad (Hyprland + Acer Nitro)
# ==============================================================================

# ── WORKSPACES (3 dedos) ──────────────────────────────────────────────────────
# Deslizar hacia la izquierda → Siguiente workspace
gesture swipe left 3  hyprctl dispatch workspace e+1

# Deslizar hacia la derecha → Workspace anterior
gesture swipe right 3 hyprctl dispatch workspace e-1

# ── APLICACIONES (3 dedos hacia arriba) ───────────────────────────────────────
# Deslizar hacia arriba → Abrir Rofi (Launcher)
gesture swipe up 3    hyprctl dispatch exec rofi -show drun

# Deslizar hacia abajo → Cerrar ventana activa
gesture swipe down 3  hyprctl dispatch killactive

# ── ZOOM (Pinch con 2 o 3 dedos) ──────────────────────────────────────────────
# Nota: Muchas apps de Wayland (Firefox) ya lo hacen nativo. 
# Esto es para Zoom GLOBAL del sistema.
gesture pinch out 2   zoom in
gesture pinch in 2    zoom out
gesture pinch in 3    zoom reset

# ── WORKSPACES (4 dedos) ──────────────────────────────────────────────────────
# Deslizar con 4 dedos hacia arriba → Overview (previo)
gesture swipe up 4    hyprctl dispatch workspace previous

# Deslizar con 4 dedos hacia abajo → Mover ventana a otro monitor / acción extra
gesture swipe down 4  monitor-toggle
