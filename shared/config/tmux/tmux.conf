# ==============================================================================
# CAZIL SYSTEM — tmux.conf
# Configuración optimizada de tmux para el entorno 218
# ==============================================================================

# Soporte para colores verdaderos (24-bit)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mejorar el tiempo de respuesta (para vim/nvim)
set -s escape-time 0

# Aumentar el historial de líneas guardadas
set -g history-limit 50000

# Cambiar el prefijo de Ctrl+b a Ctrl+a (más cómo y rápido)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Iniciar el índice de ventanas y paneles en 1 (0 está muy lejos)
set -g base-index 1
setw -g pane-base-index 1

# Renumerar ventanas automáticamente cuando una se cierra
set -g renumber-windows on

# Habilitar soporte para el ratón (scroll, seleccionar paneles/ventanas)
set -g mouse on

# Dividir paneles con teclas más intuitivas (| y -)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Recargar configuración rápidamente con Prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Configuración de tmux recargada!"

# Navegar entre paneles al estilo Vim (hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --------------------------------------------------------------------------
# ESTÉTICA Y BARRA DE ESTADO (Tema 218)
# --------------------------------------------------------------------------

# Centrar la lista de ventanas
set -g status-justify centre

# Colores de la barra
set -g status-bg "#1e1e2e" # Fondo oscuro
set -g status-fg "#cdd6f4" # Texto claro

# Estilo de la ventana activa
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I #[fg=#1e1e2e,bg=#b4befe,bold] #W "
# Estilo de las ventanas inactivas
setw -g window-status-format "#[fg=#cdd6f4,bg=#313244] #I #[fg=#cdd6f4,bg=#45475a] #W "

# Lado izquierdo (mostrar número de sesión)
set -g status-left "#[fg=#1e1e2e,bg=#a6e3a1,bold] ❐ #S #[bg=default] "
set -g status-left-length 20

# Lado derecho (mostrar hora y hostname)
set -g status-right "#[fg=#1e1e2e,bg=#f38ba8,bold] %H:%M #[fg=#1e1e2e,bg=#fab387,bold] #h "
set -g status-right-length 50

# Bordes de los paneles
set -g pane-border-style fg="#313244"
set -g pane-active-border-style fg="#89b4fa"
