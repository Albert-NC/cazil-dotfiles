# ==============================================================================
# CAZIL SYSTEM — VARIABLES DE ENTORNO UNIFICADAS
# Compartido entre temas 218 y Ilidary
# ==============================================================================

# --------------------------------------------------------------------------
# XDG / SESIÓN
# --------------------------------------------------------------------------
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# --------------------------------------------------------------------------
# NVIDIA (CRÍTICO — activo siempre en hardware híbrido)
# --------------------------------------------------------------------------
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __NV_PRIME_RENDER_OFFLOAD,1
# Nota: WLR_NO_HARDWARE_CURSORS es manejado por el bloque 'cursor' en windows.conf

# --------------------------------------------------------------------------
# QT / GTK — Compatibilidad Wayland + fallback X11
# --------------------------------------------------------------------------
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1

# --------------------------------------------------------------------------
# CURSOR
# --------------------------------------------------------------------------
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
