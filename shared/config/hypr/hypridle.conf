# ==============================================================================
# CAZIL SYSTEM — hypridle.conf
# Gestión de inactividad y bloqueo de pantalla automático
# ==============================================================================
#
# Lógica:
#   900s  (15 min) → bloquear pantalla con hyprlock
#   1080s (18 min) → suspender el sistema
#   Tapa cerrada   → suspender inmediatamente (ver keybinds.conf)
# ==============================================================================

general {
    lock_cmd         = pidof hyprlock || hyprlock   # Solo una instancia de hyprlock
    before_sleep_cmd = hyprlock                     # Bloquear ANTES de suspender
    after_sleep_cmd  = hyprctl dispatch dpms on     # Encender pantalla al despertar
    ignore_dbus_inhibit = false                     # Respetar inhibidores (p.ej. video)
    ignore_systemd_inhibit = false
}

# ── 15 minutos sin actividad → apagar pantalla + bloquear ──────────────────
listener {
    timeout    = 900
    on-timeout = hyprctl dispatch dpms off && hyprlock
    on-resume  = hyprctl dispatch dpms on
}

# ── 18 minutos sin actividad → suspender el sistema ────────────────────────
listener {
    timeout    = 1080
    on-timeout = systemctl suspend
}
