# ==============================================================================
# CAZIL SYSTEM — winapps.conf
# Configuración para WinApps (Integración Windows)
# ==============================================================================

# Usuario de la VM de Windows
RDP_USER="cazil"

# Contraseña de la VM de Windows
RDP_PASS="password"

# IP o Nombre de la VM (Por defecto 'Windows' si usas libvirt)
RDP_IP="Windows"

# Opciones de visualización
# - "true" para usar la GPU del host si es posible
# - "false" para renderizado normal
RDP_FLAGS="/cert:ignore /sound:sys:alsa /network:lan /drive:home,$HOME"

# Monitor (opcional)
# MULTIMON="true"
